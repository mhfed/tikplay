# Fly.io config for craw-music (TikPlay).
app = "craw-music"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  CACHE_DIR = "/app/cache"
  DB_PATH = "/app/cache/tikplay.json"
  CACHE_TTL_DAYS = "7"
  CACHE_MAX_GB = "2"
  PORT = "3000"

[mounts]
  source = "craw_cache"
  destination = "/app/cache"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
