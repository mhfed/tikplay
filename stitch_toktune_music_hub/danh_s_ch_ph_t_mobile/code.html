<div class="w-1 bg-secondary-container transition-all duration-300" style="height: 20%;"></div>
</div>
<script>
        // Simple Micro-interaction: Randomize visualizer bars
        const bars = document.querySelectorAll('#ambient-visualizer div');
        setInterval(() => {
            bars.forEach(bar => {
                const height = Math.floor(Math.random() * 100);
                bar.style.height = `${height}%`;
            });
        }, 150);

        // Ripple Effect on Create Button
        const createBtn = document.querySelector('button.group');
        createBtn.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'absolute bg-white/20 rounded-full animate-ping pointer-events-none';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.left = `${e.offsetX - 50}px`;
            ripple.style.top = `${e.offsetY - 50}px`;
            createBtn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
