<style>
        @keyframes vinyl-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-vinyl {
            animation: vinyl-rotate 20s linear infinite;
        }
        .animate-vinyl-paused {
            animation-play-state: paused;
        }
        .neon-glow-cyan {
            box-shadow: 0 0 40px -10px rgba(0, 221, 214, 0.6);
        }
        .neon-glow-pink {
            box-shadow: 0 0 40px -10px rgba(255, 81, 106, 0.4);
        }
        .glass-panel {
            background: rgba(22, 22, 22, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .neumorphic-btn {
            background: #161616;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5), -4px -4px 10px rgba(255,255,255,0.05);
        }
        .neumorphic-btn:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8), inset -2px -2px 5px rgba(255,255,255,0.05);
        }
        .eq-bar {
            width: 3px;
            background: linear-gradient(to top, #00ddd6, #ff516a);
            border-radius: 2px;
            animation: eq-pulse 1.2s ease-in-out infinite;
        }
        @keyframes eq-pulse {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }
        .vinyl-grooves {
            background: repeating-radial-gradient(
                circle at center,
                transparent 0,
                transparent 2px,
                rgba(255, 255, 255, 0.05) 3px,
                transparent 4px
            );
        }
    </style>

<body class="bg-background text-on-surface font-body-md overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Atmospheric Effect -->

<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-on-primary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-on-secondary-container/20 blur-[120px] rounded-full"></div>
</div>
<!-- Top App Bar -->

<button class="text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform">

</button>

<button class="text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform">

<span class="material-symbols-outlined text-[20px] active:text-primary-fixed-dim transition-colors">playlist_add</span>
<span class="material-symbols-outlined text-[20px] active:text-primary-fixed-dim transition-colors">share</span>
</div>
<script>
        // EQ Generation
        const eqContainer = document.getElementById('eq');
        for (let i = 0; i < 30; i++) {
            const bar = document.createElement('div');
            bar.className = 'eq-bar';
            bar.style.animationDelay = `${Math.random() * 2}s`;
            bar.style.animationDuration = `${0.5 + Math.random() * 1.5}s`;
            eqContainer.appendChild(bar);
        }

        // Toggle Play/Pause Logic
        const playBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const vinylArt = document.getElementById('vinyl-art');
        const eqBars = document.querySelectorAll('.eq-bar');
        const progressBar = document.getElementById('progress-bar');
        const halo = document.getElementById('halo');

        let isPlaying = true;
        let progressPercent = 35;

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playIcon.innerText = 'pause';
                vinylArt.classList.remove('animate-vinyl-paused');
                halo.classList.add('animate-pulse');
                eqBars.forEach(bar => bar.style.animationPlayState = 'running');
                playBtn.classList.add('neon-glow-cyan');
            } else {
                playIcon.innerText = 'play_arrow';
                vinylArt.classList.add('animate-vinyl-paused');
                halo.classList.remove('animate-pulse');
                eqBars.forEach(bar => bar.style.animationPlayState = 'paused');
                playBtn.classList.remove('neon-glow-cyan');
            }
        });

        // Simple Progress Simulation
        setInterval(() => {
            if (isPlaying && progressPercent < 100) {
                progressPercent += 0.1;
                progressBar.style.width = `${progressPercent}%`;
            }
        }, 1000);
    </script>
